<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>♻️ Szelektív hulladékgyűjtés</h1>
        <div id="topInfo">Pontszám: <span id="score">0</span> | Idő: <span id="time"></span></div>
    </header>

    <main id="gameArea">
        <section id="bins" aria-label="Kukák">
            <div class="bin" data-type="paper">
                <div class="bin-top"></div>
                <div class="bin-body">
                    <div class="bin-label">Papír</div>
                    <div class="count">0</div>
                </div>
            </div>

            <div class="bin" data-type="plastic">
                <div class="bin-top"></div>
                <div class="bin-body">
                    <div class="bin-label">Műanyag</div>
                    <div class="count">0</div>
                </div>
            </div>

            <div class="bin" data-type="metal">
                <div class="bin-top"></div>
                <div class="bin-body">
                    <div class="bin-label">Fém</div>
                    <div class="count">0</div>
                </div>
            </div>

            <div class="bin" data-type="mixed">
                <div class="bin-top"></div>
                <div class="bin-body">
                    <div class="bin-label">Vegyes</div>
                    <div class="count">0</div>
                </div>
            </div>
        </section>

        <section id="playArea" aria-label="Játéktér">
            <!-- ide kerülnek a generált hulladékdarabok -->
        </section>

      
    </main>
    <div id="bottomInfo"><div>Hibák: <span id="errors">0</span></div></div>

    <script src="script.js"></script>
</body>
</html>
